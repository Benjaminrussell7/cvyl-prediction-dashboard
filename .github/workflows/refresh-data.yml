name: Refresh CVYL Data

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh processed data
        run: python -m cvyl_scraper.cli --config config/discovered_sources.yml --team-aliases config/team_aliases.yml

      - name: Commit refreshed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            data/processed/cvyl_games.csv \
            data/processed/cvyl_completed_games.csv \
            data/processed/cvyl_scheduled_games.csv \
            data/processed/cvyl_team_games.csv \
            data/processed/cvyl_elo_ratings.csv \
            data/processed/cvyl_elo_history.csv \
            data/processed/cvyl_sos.csv \
            data/processed/cvyl_power_ratings_v2.csv \
            data/processed/cvyl_power_ratings_v3_recency.csv \
            data/processed/cvyl_model_comparison.csv \
            data/processed/cvyl_model_comparison_summary.csv \
            data/processed/cvyl_model_comparison_v3.csv \
            data/processed/cvyl_model_comparison_v3_summary.csv \
            data/processed/cvyl_calibration_power_rating.csv \
            data/processed/cvyl_backtest.csv \
            data/processed/cvyl_backtest_summary.csv
          if git diff --cached --quiet; then
            echo "No processed data changes to commit."
          else
            git commit -m "Refresh CVYL processed data"
            git push
          fi
